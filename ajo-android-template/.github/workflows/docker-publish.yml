name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main", "master" ] # Añadido master ya que en tu foto el repo usa 'master'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/ajo-android-template

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}, ${{ secrets.DOCKER_USERNAME }}/ajo-android-template:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GOOGLE_SERVICES_JSON_CONTENT=${{ secrets.GOOGLE_SERVICES_JSON_CONTENT }}
            ADOBE_APP_ID=${{ secrets.ADOBE_APP_ID }}
            ADOBE_ASSURANCE_SESSION_ID=${{ secrets.ADOBE_ASSURANCE_SESSION_ID }}
